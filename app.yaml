runtime: nodejs22
instance_class: F2

automatic_scaling:
  min_instances: 1
  max_instances: 6
  target_cpu_utilization: 0.65

env_variables:
  NODE_ENV: "production"
  APP_STATUS: "PROD"
  DATABASE_APPLICATION_NAME: "clayportal-web"
  DATABASE_POOL_MAX: "5"
  DATABASE_POOL_HARD_CAP: "8"
  DATABASE_SLOW_QUERY_MS: "750"

build_env_variables:
  GOOGLE_NODE_RUN_SCRIPTS: "build"

entrypoint: npm run start

handlers:
  - url: /.*
    secure: always
    redirect_http_response_code: 301
    script: auto

# Uncomment and update this when you attach App Engine to a VPC connector.
# vpc_access_connector:
#   name: projects/your-project/locations/us-central1/connectors/your-connector
